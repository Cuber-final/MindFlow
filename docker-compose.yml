services:
  backend:
    build:
      context: ./backend
    container_name: mindflow-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.siliconflow.cn/v1}
      - AI_MODEL=${AI_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      - MPTEXT_API_KEY=${MPTEXT_API_KEY:-}
      - MPTEXT_BASE_URL=${MPTEXT_BASE_URL:-https://down.mptext.top}
    volumes:
      - ./data:/app/data
      - ./backend/.env:/app/.env:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: mindflow-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: mindflow-network
